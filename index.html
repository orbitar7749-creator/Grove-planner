<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grove Planner 🌿</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
:root {
  --bg-image: url('1000035213.jpg'); /* Ensure the image is in the same folder */
  --panel: rgba(26, 42, 26, 0.85);
  --border: #5a8a50;
  --highlight: #9dcf7c;
  --text: #d8f0c0;
  --gold: #e8d070;
  --bluebell: #7890c8;
}

body {
  background-image: var(--bg-image);
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  color: var(--text);
  font-family: 'VT323', monospace;
  font-size: 19px;
  margin: 0;
  min-height: 100vh;
}

/* Study HUD (JEE Prep) */
#studyHud {
  position: sticky;
  top: 10px;
  z-index: 100;
  max-width: 250px;
  margin: 10px auto;
  background: var(--panel);
  border: 2px solid var(--bluebell);
  padding: 8px;
  text-align: center;
  backdrop-filter: blur(4px);
}

.app {
  max-width: 600px;
  margin: 0 auto;
  padding: 20px 14px 80px;
  position: relative;
}

.panel {
  background: var(--panel);
  border: 2px solid var(--border);
  backdrop-filter: blur(2px);
  padding: 15px;
  margin-bottom: 20px;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.4);
}

.clock-digits {
  font-family: 'Press Start 2P', monospace;
  font-size: 24px;
  color: var(--gold);
  text-shadow: 2px 2px 0 #000;
  text-align: center;
}

.sec-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  color: var(--highlight);
  margin: 10px 0;
  text-transform: uppercase;
}

/* Activity Row Styling */
.act-row {
  display: flex;
  margin-bottom: 8px;
  background: rgba(0,0,0,0.2);
  border: 1px solid var(--border);
}

.act-time {
  padding: 10px;
  background: rgba(0,0,0,0.3);
  font-size: 14px;
  color: var(--bluebell);
  min-width: 70px;
  text-align: center;
}

.act-body {
  flex: 1;
  padding: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.prog-track {
  height: 10px;
  background: #111;
  border: 1px solid var(--border);
  margin-top: 10px;
}

.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--border), var(--highlight));
}

button {
  font-family: 'VT323';
  cursor: pointer;
  background: var(--border);
  border: none;
  color: #fff;
  padding: 5px 10px;
}
</style>
</head>
<body>

<div id="studyHud">
    <div style="font-family: 'Press Start 2P'; font-size: 6px; color: var(--bluebell);">2026 JEE COUNTDOWN</div>
    <div id="countdown" style="margin-top:5px;">Loading...</div>
</div>

<div class="app">
  <div class="panel">
    <div id="dateLine" style="text-align:center; font-size: 14px; margin-bottom: 5px;"></div>
    <div class="clock-digits" id="clock">00:00</div>
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  </div>

  <div class="sec-title">Current Manifest</div>
  <div id="actList">
    </div>
</div>

<script>
const activities = [
    {name:'Astrophysics Study', start:'09:00', emoji:'⭐'},
    {name:'JEE Prep', start:'11:30', emoji:'📚'},
    {name:'Lunch', start:'13:30', emoji:'🍵'},
    {name:'Afternoon Study', start:'15:00', emoji:'✏️'}
];

function update() {
    const now = new Date();
    // Clock
    document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    document.getElementById('dateLine').innerText = now.toDateString().toUpperCase();
    
    // Countdown to JEE 2026 (Approx April 1st)
    const target = new Date('2026-04-01');
    const diff = Math.floor((target - now) / (1000*60*60*24));
    document.getElementById('countdown').innerText = diff + " DAYS TO GO";

    // Day Progress (6am to 10pm)
    const start = 6 * 60;
    const end = 22 * 60;
    const current = now.getHours() * 60 + now.getMinutes();
    const pct = Math.max(0, Math.min(100, ((current - start) / (end - start)) * 100));
    document.getElementById('progFill').style.width = pct + "%";
}

function render() {
    const list = document.getElementById('actList');
    list.innerHTML = activities.map(a => `
        <div class="act-row">
            <div class="act-time">${a.start}</div>
            <div class="act-body">
                <span>${a.emoji}</span>
                <span>${a.name}</span>
            </div>
        </div>
    `).join('');
}

setInterval(update, 1000);
update();
render();
</script>
</body>
</html>
