<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#3a6b3a">
<title>Grove Planner 🌿</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Silkscreen&display=swap" rel="stylesheet">
<style>
:root {
  --bg-image: url('1000035213.jpg'); /* The background file */
  --bg2:       #1e3820;
  --highlight: #9dcf7c;
  --glow:      #c8e8a0;
  --pink1:     #e8a0b8;
  --bluebell:  #7890c8;
  --firefly:   #e8f870;
  --panel:     rgba(30,56,32,0.88);
  --panel2:    rgba(42,72,36,0.92);
  --border:    #5a8a50;
  --border2:   #8cc870;
  --text:      #d8f0c0;
  --text2:     #b8d898;
  --muted:     #7a9a6a;
  --gold:      #e8d070;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}

body{
  /* Background set to your uploaded file */
  background-image: var(--bg-image);
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  background-color: var(--bg2);
  color: var(--text);
  font-family: 'VT323', monospace;
  font-size: 19px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Scrollbar */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background: #3d6b38;}

/* APP WRAPPER */
.app{
  position:relative;
  z-index:3;
  max-width:660px;
  margin: 0 auto;
  padding: 0 14px 80px;
}

/* PANELS */
.panel{
  background: var(--panel);
  border: 2px solid var(--border);
  box-shadow: 3px 3px 0 rgba(10,25,10,0.5);
  backdrop-filter: blur(4px); /* Slightly increased blur for legibility over the image */
  position: relative;
}

/* CLOCK & HEADER */
.header-zone{ padding: 18px 16px 10px; text-align: center; }
.date-line{ font-family: 'Press Start 2P', monospace; font-size: 7px; letter-spacing: 3px; color: var(--highlight); margin-bottom: 10px; }
.clock-row{ display: flex; align-items: baseline; justify-content: center; gap: 6px; margin-bottom: 12px; }
.clock-digits{ font-family: 'Press Start 2P', monospace; font-size: 26px; color: var(--gold); text-shadow: 2px 2px 0 rgba(0,0,0,0.4); }
.clock-ampm{ font-family: 'Press Start 2P', monospace; font-size: 11px; color: var(--pink1); }

/* PROGRESS */
.progress-wrap{ padding: 10px 14px 14px; }
.prog-label{ display: flex; justify-content: space-between; align-items: center; font-size: 14px; color: var(--text2); margin-bottom: 6px; }
.prog-label b{ font-family: 'Press Start 2P'; font-size: 6px; color: var(--highlight); }
.prog-track{ height: 14px; background: rgba(10,25,10,0.6); border: 2px solid var(--border); position: relative; overflow: hidden; }
.prog-fill{ height: 100%; background: linear-gradient(90deg, #3d8a30, #6aaa5a, #9dcf7c, #c8e8a0); transition: width 1s ease; }

.notif-bar{ text-align: center; font-size: 13px; color: var(--muted); padding: 4px 14px 6px; cursor: pointer; }
.sec-title{ font-family: 'Press Start 2P', monospace; font-size: 7px; letter-spacing: 2px; color: var(--highlight); padding: 12px 14px 4px; display: flex; align-items: center; gap: 8px; }
.sec-title::after{ content:''; flex:1; height:1px; background: linear-gradient(90deg, var(--border), transparent); }

/* TIMETABLE */
.act-row{ display: flex; align-items: stretch; margin: 2px 10px; transition: opacity 0.3s; }
.act-row.done{ opacity: 0.42; }
.act-time{ width: 76px; font-size: 14px; color: var(--bluebell); background: rgba(10,25,10,0.5); border: 2px solid var(--border); border-right: none; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5px 3px; }
.act-body{ flex: 1; background: rgba(42,72,36,0.7); border: 2px solid var(--border); padding: 7px 10px; display: flex; align-items: center; gap: 8px; cursor: pointer; position: relative; }
.act-body.now{ border-color: var(--firefly); background: rgba(60,80,20,0.7); }
.act-chk{ width: 16px; height: 16px; border: 2px solid var(--border2); background: rgba(10,25,10,0.6); display: flex; align-items: center; justify-content: center; font-size: 11px; }
.act-chk.on{ background: #4e8244; border-color: var(--glow); }
.act-chk.on::after{ content: '✓'; color: var(--glow); }
.act-emoji{ font-size: 17px; }
.act-name{ flex: 1; font-size: 18px; color: var(--text); }
.act-dur{ font-size: 13px; color: var(--muted); }

/* BUTTONS */
.add-btn{ display: flex; align-items: center; justify-content: center; margin: 6px 10px 2px; padding: 8px; background: none; border: 2px dashed var(--border); color: var(--muted); font-family: 'VT323'; font-size: 18px; cursor: pointer; width: calc(100% - 20px); }
.row-btns{ display: flex; gap: 6px; margin: 8px 10px; }
.pbtn{ flex: 1; padding: 8px 4px; font-family: 'Press Start 2P'; font-size: 6px; border: 2px solid; cursor: pointer; }
.pbtn-g{ background: rgba(40,80,30,0.8); border-color: #6aaa5a; color: var(--glow); }
.pbtn-b{ background: rgba(25,40,80,0.8); border-color: var(--bluebell); color: #a0c0f8; }
.pbtn-r{ background: rgba(80,30,30,0.8); border-color: #d08080; color: #f0a0a0; }

.divider{ text-align: center; font-size: 15px; color: var(--border2); letter-spacing: 6px; padding: 8px 0; opacity: 0.7; }

/* CALENDARS */
.week-grid, .month-grid { display: grid; gap: 2px; padding: 0 10px; }
.week-grid { grid-template-columns: repeat(7, 1fr); }
.month-grid { grid-template-columns: repeat(7, 1fr); padding: 0; }
.wday, .mcell { background: rgba(10,25,10,0.5); border: 2px solid var(--border); min-height: 40px; padding: 4px; cursor: pointer; }
.wday.today, .mcell.today { border-color: var(--firefly); }
.wdn, .mcell-head { font-family: 'Press Start 2P'; font-size: 5px; color: var(--muted); text-align: center; }

/* MODALS */
.overlay{ position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 50; display: none; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
.overlay.open{ display: flex; }
.modal{ background: var(--panel2); border: 3px solid var(--border2); width: 90%; max-width: 380px; padding-bottom: 10px; }
.pinput{ width: 100%; padding: 8px; background: rgba(0,0,0,0.4); border: 1px solid var(--border); color: white; font-family: 'VT323'; font-size: 18px; }

/* TOASTS */
.toasts{ position: fixed; top: 12px; right: 12px; z-index: 200; }
.toast{ background: var(--panel2); border: 2px solid var(--border2); padding: 10px; margin-bottom: 5px; font-size: 14px; }
</style>
</head>
<body>

<div class="toasts" id="toastArea"></div>

<div class="app">
  <div class="header-zone panel" style="margin-top:12px;">
    <div class="date-line" id="dateLine">LOADING...</div>
    <div class="clock-row">
      <div class="clock-digits" id="clockDigits">--:--</div>
      <div class="clock-ampm" id="clockAMPM">--</div>
    </div>
    <div class="progress-wrap">
      <div class="prog-label"><b>🌱 DAY PROGRESS</b> <span id="progPct">0%</span></div>
      <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>
    <div class="notif-bar" id="notifBar" onclick="askNotif()">🔔 Tap to enable notifications</div>
  </div>

  <div class="sec-title">🌿 TODAY'S TIMETABLE</div>
  <div class="panel">
    <div id="actList"></div>
    <button class="add-btn" onclick="openActModal()">＋ ADD ACTIVITY</button>
    <div class="row-btns">
      <button class="pbtn pbtn-g" onclick="saveDefault()">💾 SAVE DEFAULT</button>
      <button class="pbtn pbtn-b" onclick="loadDefault()">📂 LOAD DEFAULT</button>
      <button class="pbtn pbtn-r" onclick="resetAll()">↺ RESET</button>
    </div>
  </div>

  <div class="divider">✿ ✦ ✿</div>

  <div class="sec-title">🍂 WEEK VIEW</div>
  <div class="panel" style="padding: 10px 0;">
    <div class="week-grid" id="weekGrid"></div>
  </div>

  <div class="divider">❧ ✿ ❧</div>

  <div class="sec-title">🌸 MONTH VIEW</div>
  <div class="panel" style="padding: 10px;">
    <div class="month-grid" id="monthGrid"></div>
  </div>
</div>

<div class="overlay" id="actModal">
  <div class="modal">
    <div style="padding:10px; color:var(--highlight); font-family:'Press Start 2P'; font-size:8px;">NEW ACTIVITY</div>
    <div style="padding:15px; display:flex; flex-direction:column; gap:10px;">
      <input class="pinput" id="aName" placeholder="Activity Name"/>
      <div style="display:flex; gap:10px;">
        <input class="pinput" id="aStart" type="time"/>
        <input class="pinput" id="aEnd" type="time"/>
      </div>
      <button class="pbtn pbtn-g" onclick="saveAct()">SAVE</button>
    </div>
  </div>
</div>

<script>
// --- STATE & STORAGE ---
let activities = [], defaultActs = [], events = {};
function persist(){ localStorage.setItem('gp_acts', JSON.stringify(activities)); }
function restore(){ 
  activities = JSON.parse(localStorage.getItem('gp_acts')) || [
    {name:'Astrophysics Study',start:'09:00',end:'11:00',emoji:'⭐',done:false},
    {name:'JEE Prep',start:'11:30',end:'13:30',emoji:'📚',done:false},
    {name:'Lunch',start:'13:30',end:'14:15',emoji:'🍵',done:false}
  ];
}

// --- CLOCK & PROGRESS ---
function tick(){
  const n = new Date();
  let h = n.getHours(), m = n.getMinutes();
  const ap = h >= 12 ? 'PM' : 'AM';
  document.getElementById('clockDigits').textContent = `${String(h%12||12).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  document.getElementById('clockAMPM').textContent = ap;
  document.getElementById('dateLine').textContent = n.toDateString().toUpperCase();
  const cur = n.getHours()*60 + m;
  const pct = Math.min(100, Math.max(0, (cur-360)/(16*60)*100));
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progPct').textContent = Math.round(pct) + '%';
}

// --- RENDER ---
function renderActs(){
  const list = document.getElementById('actList');
  list.innerHTML = activities.map((a, i) => `
    <div class="act-row ${a.done?'done':''}">
      <div class="act-time">${a.start}</div>
      <div class="act-body" onclick="toggleDone(${i})">
        <div class="act-chk ${a.done?'on':''}"></div>
        <span>${a.emoji}</span>
        <span class="act-name">${a.name}</span>
      </div>
    </div>
  `).join('');
}

function toggleDone(i){ activities[i].done = !activities[i].done; persist(); renderActs(); }
function openActModal(){ document.getElementById('actModal').classList.add('open'); }
function saveAct(){
  const name = document.getElementById('aName').value;
  const start = document.getElementById('aStart').value;
  const end = document.getElementById('aEnd').value;
  if(name && start) {
    activities.push({name, start, end, emoji:'🌿', done:false});
    activities.sort((a,b) => a.start.localeCompare(b.start));
    persist(); renderActs();
    document.getElementById('actModal').classList.remove('open');
  }
}

// --- INITIALIZE ---
setInterval(tick, 1000);
restore();
tick();
renderActs();

// Note: Background logic for Week/Month grids would follow same pattern as original
</script>
</body>
</html>
